<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>CARTS Ticket</title>
    <style>
        /* Using system fonts to match native apps exactly */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 40px; 
            background-color: #ffffff;
            color: #000000;
            user-select: none;
        }

        .header { 
            font-size: 15px; 
            margin-bottom: 30px; 
            color: #444; 
            font-weight: 400;
        }
        
        .ticket-visual {
            position: relative;
            width: 190px; 
            height: 190px;
            display: flex; 
            justify-content: center; 
            align-items: center;
        }

        /* The Heartbeat Animation - Only on the red circle */
        .red-pulse-bg {
            position: absolute;
            width: 100%; 
            height: 100%;
            background-color: #E31837; 
            border-radius: 50%;
            z-index: 1;
            animation: heartbeat 1.4s ease-in-out infinite;
        }

        .inner-circle-static {
            position: relative;
            width: 110px; 
            height: 110px;
            background: white;
            border-radius: 50%;
            z-index: 2;
            display: flex; 
            justify-content: center; 
            align-items: center;
            border: 3px solid #000;
            overflow: hidden;
        }

        /* This is where your icon goes */
        .inner-circle-static img {
            width: 85%;
            height: auto;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            12% { transform: scale(1.15); } /* Lub */
            24% { transform: scale(1.02); }
            36% { transform: scale(1.1); }  /* Dub */
            50% { transform: scale(1); }
            100% { transform: scale(1); }
        }

        #clock { 
            font-size: 48px; 
            font-weight: 600; 
            margin: 25px 0; 
            letter-spacing: -1px;
        }

        .btn { 
            background: #FFB800; /* Matching the yellow in the video */
            width: 92%; 
            padding: 18px 0; 
            border-radius: 45px; 
            text-align: center; 
            font-size: 34px; 
            font-weight: 700; 
            color: #ffffff; 
            margin-bottom: 30px;
            box-shadow: 0 4px 4px rgba(0,0,0,0.1);
        }

        .info { 
            width: 90%; 
            border-top: 1px solid #efefef; 
            padding-top: 25px; 
            text-align: left;
        }

        .ticket-title { font-size: 22px; font-weight: 700; display: block; margin-bottom: 4px;}
        .counties { font-size: 14px; color: #888; display: block; line-height: 1.3; }
        .expiry { font-weight: 700; margin-top: 20px; font-size: 17px; color: #222; }

    </style>
</head>
<body>
    <div class="header">Show operator your ticket</div>
    
    <div class="ticket-visual">
        <div class="red-pulse-bg"></div>
        <div class="inner-circle-static">
            <img src="https://via.placeholder.com/100?text=LOGO" alt="Logo">
        </div>
    </div>

    <div id="clock">00:00:00 PM</div>
    
    <div class="btn">All Day</div>
    
    <div class="info">
        <span class="ticket-title">Interurban All Day - 1517 Express</span>
        <span class="counties">Bastrop, Blanco, Burnet, Caldwell, Fayette, Hays, Lee, Llano, Travis, and Williamson Counties, TX</span>
        <p class="expiry" id="exp"></p>
    </div>

    <script>
        function update() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();
            let ampm = hours >= 12 ? 'PM' : 'AM';
            
            hours = hours % 12;
            hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0'+minutes : minutes;
            seconds = seconds < 10 ? '0'+seconds : seconds;
            
            document.getElementById('clock').innerText = hours + ':' + minutes + ':' + seconds + ' ' + ampm;
        }

        // Logic for Expiry: Tomorrow at 7:21 AM
        function setExpiry() {
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            
            const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            const month = monthNames[tomorrow.getMonth()];
            const day = tomorrow.getDate();
            const year = tomorrow.getFullYear();
            
            document.getElementById('exp').innerText = "Expires " + month + " " + day + ", " + year + ", 7:21 AM";
        }

        setInterval(update, 1000);
        update();
        setExpiry();
    </script>
</body>
</html>
