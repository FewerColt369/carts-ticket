<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="white">
    <title>CARTS Ticket</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 30px; 
            background-color: #ffffff;
            user-select: none;
        }

        .header { 
            font-size: 14px; 
            margin-bottom: 25px; 
            color: #333; 
        }
        
        /* The Container - Keeps everything centered */
        .ticket-visual {
            position: relative;
            width: 185px; 
            height: 185px;
            display: flex; 
            justify-content: center; 
            align-items: center;
        }

        /* ONLY THE RED CIRCLE ANIMATES */
        .red-pulse-bg {
            position: absolute;
            width: 100%; 
            height: 100%;
            background-color: #E31837; 
            border-radius: 50%;
            z-index: 1;
            /* The Heartbeat Animation */
            animation: heartbeat 1.4s ease-in-out infinite;
            transform-origin: center;
        }

        /* THE WHITE CENTER - NO MOVEMENT */
        .inner-circle-static {
            position: relative;
            width: 105px; 
            height: 105px;
            background: white;
            border-radius: 50%;
            z-index: 2; /* Sits on top of the red pulse */
            display: flex; 
            justify-content: center; 
            align-items: center;
            font-size: 11px; 
            font-weight: 800; 
            text-align: center;
            color: black;
            border: 2.5px solid black;
            /* No animation here */
        }

        /* The Heartbeat Movement */
        @keyframes heartbeat {
            0% { transform: scale(1); }
            12% { transform: scale(1.15); } /* Lub */
            24% { transform: scale(1.02); }
            36% { transform: scale(1.1); }  /* Dub */
            50% { transform: scale(1); }
            100% { transform: scale(1); }
        }

        #clock { 
            font-size: 44px; 
            font-weight: 700; 
            margin: 25px 0; 
            color: #222;
        }

        .btn { 
            background: #FFC107; 
            width: 90%; 
            padding: 16px 0; 
            border-radius: 40px; 
            text-align: center; 
            font-size: 30px; 
            font-weight: bold; 
            color: white; 
            margin-bottom: 25px;
        }

        .info { 
            width: 88%; 
            border-top: 1.5px solid #eee; 
            padding-top: 25px; 
        }

        .ticket-title { font-size: 20px; font-weight: bold; display: block; }
        .counties { font-size: 13px; color: #666; display: block; margin-top: 5px; }
        .expiry { font-weight: bold; margin-top: 18px; font-size: 16px; }
    </style>
</head>
<body>
    <div class="header">Show operator your ticket</div>
    
    <div class="ticket-visual">
        <div class="red-pulse-bg" id="red-heart"></div>
        
        <div class="inner-circle-static">
            SYSTEM<br>CENTRAL AREA RURAL<br>TRANSPORTATION
        </div>
    </div>

    <div id="clock">00:00:00 PM</div>
    
    <div class="btn">All Day</div>
    
    <div class="info">
        <span class="ticket-title">Interurban All Day - 1517 Express</span>
        <span class="counties">Bastrop, Blanco, Burnet, Caldwell, Fayette, Hays, Lee, Llano, Travis, and Williamson Counties, TX</span>
        <p class="expiry" id="exp"></p>
    </div>

    <script>
        const heartBg = document.getElementById('red-heart');

        function update() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();

            // Randomize the next pulse interval slightly
            const randomDuration = (Math.random() * (1.8 - 1.3) + 1.3).toFixed(2);
            heartBg.style.animationDuration = randomDuration + 's';
        }

        setInterval(update, 1000);
        update();
        
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        const options = { month: 'short', day: 'numeric', year: 'numeric' };
        document.getElementById('exp').innerText = "Expires " + tomorrow.toLocaleDateString('en-US', options) + ", 7:21 AM";
    </script>
</body>
</html>
